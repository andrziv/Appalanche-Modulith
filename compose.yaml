version: '3.9'

services:
  app:
    image: 'andrej-ziv/jobhunt-spring-backend:latest'
    build:
      context: .
    container_name: app_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_USER=$PG_USERNAME
      - POSTGRES_PASSWORD=$PG_PASSWORD
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/$PG_DB_NAME
      - SPRING_DATASOURCE_USERNAME=$PG_USERNAME
      - SPRING_DATASOURCE_PASSWORD=$PG_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVER_PORT=8080
    ports:
      - "8081:8080"

  db:
    image: postgres
    container_name: db_postgres
    environment:
      - POSTGRES_USER=$PG_USERNAME
      - POSTGRES_PASSWORD=$PG_PASSWORD
      - POSTGRES_DB=$PG_DB_NAME
    ports:
      - "8082:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $PG_USERNAME -d $PG_DB_NAME" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
        - jobhunt-net

networks:
  jobhunt-net:
    driver: bridge